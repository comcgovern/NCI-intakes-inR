name: R Tests

on:
  workflow_dispatch:

jobs:
  test:
    name: Run R Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfribidi-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Install package dependencies
        run: |
          install.packages(c(
            "nlme", "MASS", "survey",
            "testthat", "lme4"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Install package
        run: R CMD INSTALL --no-multiarch --with-keep.source .

      - name: Run testthat unit tests
        run: |
          library(testthat)
          library(nciusual)
          results <- test_dir("tests/testthat", reporter = "progress", stop_on_failure = TRUE)
          print(results)
        shell: Rscript {0}

      - name: Run SAS macro validation tests
        run: |
          source("tests/test_validate.R")
        shell: Rscript {0}
